name: Hourly ATIS Scraper

on:
  schedule:
    - cron: '0 * * * *'  # 协调世界时 (UTC) 每小时整点触发
  workflow_dispatch:      # 允许你点击按钮手动运行，方便测试

# 添加全局环境变量，主动选择使用 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    # 必须开启写入权限，否则脚本无法把 log 提交回仓库
    permissions:
      contents: write

    steps:
      # 1. 升级 checkout action 到 v5
      - name: Checkout code
        uses: actions/checkout@v5

      # 2. 升级 setup-python action 到 v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # 3. 安装依赖（这步失败会导致 exit code 1）
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pytz

      # 4. 运行抓取脚本（这步失败也会导致 exit code 1）
      - name: Run Scraper
        run: python scraper.py

      # 5. 提交并推送更改
      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add .
          git commit -m "Update compact ATIS log for $(date)" || echo "No changes to commit"
          git push
